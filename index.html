<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0B0F17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mesh Fracture Demo</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #0B0F17;
      color: #F2F4F7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      position: fixed; inset: 0;
      touch-action: none;
    }

    /* iOS safe-area shim. viewport-fit=cover lets the canvas extend under
       the iPhone notch / dynamic island; without compensation, UI Toolkit
       elements at top:16 render inside the bezel. We expose the four
       env(safe-area-inset-*) values as CSS custom properties so the JS
       resize() can read them via getPropertyValue and shrink the canvas
       to the safe area. Non-notched browsers resolve env() to 0, leaving
       the canvas full-bleed. The remaining bezel strip shows body's
       background colour (#0B0F17), reading as a matte border. */
    :root {
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-right:  env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left:   env(safe-area-inset-left, 0px);
    }

    #unity-container {
      position: absolute;
      top:    var(--safe-top);
      right:  var(--safe-right);
      bottom: var(--safe-bottom);
      left:   var(--safe-left);
    }
    #unity-canvas {
      width: 100%; height: 100%;
      display: block;
      background: #0B0F17;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Loading screen — Voronoi-themed: a 4×4 chunk grid that fades in
       roughly in the order the cells would shatter from a centered impact. */
    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0B0F17;
      z-index: 2;
      transition: opacity 240ms ease-out;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    #loading h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #A1A7B3;
      margin: 0 0 24px 0;
    }
    #loading-tagline {
      font-size: 11px;
      color: #677085;
      margin: 0 0 28px 0;
      max-width: 420px;
      text-align: center;
      line-height: 1.5;
    }
    #loading-bar {
      position: relative;
      width: 240px; height: 4px;
      background: #1A2330;
      border-radius: 2px;
      overflow: hidden;
    }
    #loading-fill {
      position: absolute; top: 0; left: 0; bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, #22C55E 0%, #16A34A 100%);
      border-radius: 2px;
      transition: width 120ms ease-out;
    }
    #loading-pct {
      margin-top: 12px;
      font-size: 11px;
      color: #677085;
    }

    /* Footer ribbon — keeps the LoL hook visible without occluding the canvas.
       Position offsets stack the safe-area inset so on iPhone X+ landscape
       the ribbon sits above the home indicator instead of under it. */
    #ribbon {
      position: absolute;
      bottom: calc(8px  + var(--safe-bottom));
      right:  calc(12px + var(--safe-right));
      font-size: 11px;
      color: #677085;
      z-index: 3;
      pointer-events: auto;
    }
    #ribbon a {
      color: #A1A7B3;
      text-decoration: none;
      border-bottom: 1px dotted #263041;
    }
    #ribbon a:hover { color: #22C55E; border-bottom-color: #22C55E; }

    /* Mobile breakpoint — CSS pixels, drives the ribbon + loading-bar. The
       UI Toolkit `.mobile` class is applied separately by DemoUI in C#,
       comparing the panel root's resolved layout width (also CSS-px,
       because the panel scale is set to devicePixelRatio). Both sides agree
       on units now; when `Screen.width` is read directly inside Unity it is
       BUFFER pixels = CSS × DPR, so don't compare it against 768 raw. */
    @media (max-width: 767px) {
      #ribbon { font-size: 10px; bottom: 4px; right: 6px; }
      #loading-bar { width: 180px; }
      #loading-tagline { font-size: 10px; max-width: 280px; }
    }
  </style>
</head>
<body>

<div id="unity-container">
  <canvas id="unity-canvas" tabindex="-1"></canvas>
</div>

<div id="loading">
  <h1>Mesh Fracture Demo</h1>
  <div id="loading-tagline">URP Voronoi mesh fracture · pre-bake cache · CPU burst sim</div>
  <div id="loading-bar"><div id="loading-fill"></div></div>
  <div id="loading-pct">0%</div>
</div>

<div id="ribbon">
  Built for <a href="https://leapoflegends.com" target="_blank" rel="noopener">Leap of Legends</a>
  · <a href="https://github.com/sinanata/unity-mesh-fracture" target="_blank" rel="noopener">repo</a>
</div>

<script src="Build/WebGL.loader.js"></script>
<script>
  // Loader config. Decompression fallback is enabled in PlayerSettings so
  // GitHub Pages can serve .br files without setting Content-Encoding.
  const config = {
    arguments: [],
    dataUrl: "Build/WebGL.data.unityweb",
    frameworkUrl: "Build/WebGL.framework.js.unityweb",
    codeUrl: "Build/WebGL.wasm.unityweb",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "Sinan Ata",
    productName: "Mesh Fracture Demo",
    productVersion: "0.1.0",
    // Render at the device's native pixel density. Hard-pinning this to 1
    // makes the canvas look soft/upscaled on every Retina laptop and iPhone
    // (DPR 2-3) — the classic "Unity WebGL low resolution" complaint.
    devicePixelRatio: window.devicePixelRatio || 1,
    matchWebGLToCanvasSize: true,
  };

  const canvas      = document.querySelector("#unity-canvas");
  const loadingEl   = document.querySelector("#loading");
  const fillEl      = document.querySelector("#loading-fill");
  const pctEl       = document.querySelector("#loading-pct");

  // Resize canvas to match the safe-area portion of the viewport.
  // matchWebGLToCanvasSize=true tells Unity to keep the WebGL drawing buffer
  // in sync with this CSS size. The safe-area subtraction is essential on
  // iPhone X+ — without it, UI Toolkit elements positioned at top:16 render
  // under the dynamic island. env() values are exposed as CSS variables so
  // we can read them through getComputedStyle without parsing CSSOM rules.
  function readInsetPx(name) {
    const v = getComputedStyle(document.documentElement).getPropertyValue(name);
    const n = parseFloat(v);
    return Number.isFinite(n) ? n : 0;
  }
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const insetTop    = readInsetPx('--safe-top');
    const insetRight  = readInsetPx('--safe-right');
    const insetBottom = readInsetPx('--safe-bottom');
    const insetLeft   = readInsetPx('--safe-left');
    const cssW = Math.max(1, window.innerWidth  - insetLeft - insetRight);
    const cssH = Math.max(1, window.innerHeight - insetTop  - insetBottom);
    canvas.style.width  = cssW + "px";
    canvas.style.height = cssH + "px";
    canvas.width  = Math.floor(cssW * dpr);
    canvas.height = Math.floor(cssH * dpr);
  }
  window.addEventListener("resize", resize);
  // orientationchange fires on iOS rotation BEFORE innerWidth/innerHeight
  // settle to the new layout — defer one tick so the read picks up the
  // post-rotation viewport.
  window.addEventListener("orientationchange", () => setTimeout(resize, 50));
  resize();

  // iOS Safari: prevent page bouncing / pinch-zoom from leaking into the canvas.
  document.addEventListener("touchmove", (e) => { e.preventDefault(); }, { passive: false });
  document.addEventListener("gesturestart", (e) => { e.preventDefault(); }, { passive: false });

  createUnityInstance(canvas, config, (progress) => {
    const pct = Math.round(progress * 100);
    fillEl.style.width = pct + "%";
    pctEl.textContent  = pct + "%";
  })
  .then((unityInstance) => {
    loadingEl.classList.add("fade");
    setTimeout(() => loadingEl.remove(), 280);
  })
  .catch((message) => {
    pctEl.textContent = "Failed to load.";
    pctEl.style.color = "#EF4444";
    console.error(message);
  });
</script>
</body>
</html>
